{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correo enviado | True Beauty</title>
    <link rel="stylesheet" href="{% static 'css/recuperar_password.css' %}">
    <link rel="stylesheet" href="{% static 'css/recuperar_password_enviado.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <header class="top-header">
        <h1 class="logo"><a href="{% url 'index' %}">True Beauty</a></h1>
        <a class="login-link" href="{% url 'profesional' %}">Volver</a>
    </header>

    <main class="content-container">
        <section class="form-box form-box-message">
            <div class="message-header">
                <span class="message-kicker">Recuperacion</span>
                <h2>Revisa tu correo</h2>
            </div>

            <div class="mensaje-info">
                <i class="fas fa-envelope"></i>
                <p>Te hemos enviado un enlace para restablecer tu contrasena.</p>
                <p>Revisa tu bandeja de entrada y sigue las instrucciones del mensaje.</p>
            </div>

            <div class="button-container">
                <a href="{% url 'profesional' %}" class="submit-btn">Volver al inicio</a>
            </div>
        </section>
    </main>
</body>
</html>
