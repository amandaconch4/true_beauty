{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña | True Beauty</title>
    <link rel="stylesheet" href="{% static 'css/profesional.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <header class="top-header">
        <h1 class="logo"><a href="{% url 'index' %}">True Beauty</a></h1>
        <a class="login-link" href="{% url 'profesional' %}">Volver</a>
    </header>

    <main class="content-container">
        <div class="form-box">
            <h2>Revisa tu correo</h2>
            <div class="mensaje-info">
                <i class="fas fa-envelope"></i>
                <p>Te hemos enviado un enlace para restablecer tu contraseña.</p>
                <p>Por favor, revisa tu bandeja de entrada y sigue las instrucciones.</p>
            </div>
            <div class="button-container">
                <a href="{% url 'profesional' %}" class="submit-btn">Volver al Inicio</a>
            </div>
        </div>
    </main>

</body>
</html>
