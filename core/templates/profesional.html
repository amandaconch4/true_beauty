{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesion | True Beauty</title>
    <link rel="stylesheet" href="{% static 'css/profesional.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <header class="top-header">
        <h1 class="logo"><a href="{% url 'index' %}">True Beauty</a></h1>
        <a class="login-link" href="{% url 'profesional' %}">Iniciar sesión</a>
    </header>

    <div class="content-container">
        <div class="form-box profesi-form-box">
            <div class="profesi-header">
                <h2>Acceso Interno</h2>
            </div>

            <form id="profesiLoginForm" method="post" action="{% url 'profesional' %}">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next_url|default:'' }}">

                <div class="form-group">
                    <label for="profesi-username">Usuario</label>
                    <input id="profesi-username" name="profesi-username" type="text" required>
                    <span class="error-message" id="profesi-username-error"></span>
                </div>

                <div class="form-group">
                    <label for="profesi-password">Contraseña</label>
                    <div class="password-wrapper">
                        <input id="profesi-password" name="profesi-password" type="password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('profesi-password')">
                            <i class="fas fa-eye" id="toggleIcon-profesi-password"></i>
                        </button>
                    </div>
                    <span class="error-message" id="profesi-password-error"></span>
                </div>

                <div class="extra-links">
                    <a href="{% url 'password_reset' %}" class="forgot-password-link">
                        ¿Olvidaste tu contraseña?
                    </a>
                </div>

                {% if messages %}
                    <div class="messages">
                        {% for message in messages %}
                            <div class="alert {% if message.tags %}alert-{{ message.tags }}{% endif %}">
                                {{ message }}
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}

                <div class="form-group">
                    <label class="checkbox-container" for="profesi-remember-me">
                        <input type="checkbox" id="profesi-remember-me" name="profesi-remember-me">
                        Mantener sesion
                    </label>
                </div>

                <div class="button-container">
                    <button type="submit" class="submit-btn profesi-submit-btn">Acceder</button>
                    <button type="reset" class="reset-btn">Limpiar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(`toggleIcon-${inputId}`);

            if (!input || !icon) return;

            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        document.getElementById('profesiLoginForm').addEventListener('submit', function(event) {
            const username = document.getElementById('profesi-username');
            const usernameError = document.getElementById('profesi-username-error');
            const password = document.getElementById('profesi-password');
            const passwordError = document.getElementById('profesi-password-error');

            let esValido = true;

            if (username.value.trim() === '') {
                usernameError.textContent = 'Por favor, ingrese su nombre de usuario.';
                esValido = false;
            } else {
                usernameError.textContent = '';
            }

            if (password.value.trim() === '') {
                passwordError.textContent = 'Por favor, ingrese su contrasena.';
                esValido = false;
            } else {
                passwordError.textContent = '';
            }

            if (!esValido) {
                event.preventDefault();
            }
        });
    </script>
</body>
</html>
