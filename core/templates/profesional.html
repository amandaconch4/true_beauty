{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión | True Beauty</title>
    <link rel="stylesheet" href="{% static 'css/profesional.css' %}">
</head>

<body>
    <header class="top-header">
        <h1 class="logo"><a href="{% url 'index' %}">True Beauty</a></h1>
        <a class="login-link" href="{% url 'profesional' %}">Iniciar sesión</a>
    </header>

    <main class="login-wrapper">
        <section class="login-card">
            <h2>Iniciar sesión</h2>
            <form class="login-form" method="post" action="#">
                {% csrf_token %}
                <label for="username">Nombre de usuario</label>
                <input id="username" name="username" type="text" required>

                <label for="password">Contraseña</label>
                <input id="password" name="password" type="password" required>

                <a class="forgot-link" href="#">¿Olvidaste tu contraseña?</a>
                <button type="submit">Entrar</button>
            </form>

            <div class="login-links">
                <p>¿No tienes una cuenta? <a href="{% url 'registro' %}">Regístrate</a></p>
                <p class="empleado-acceso">Acceso empleado</p>
            </div>
        </section>
    </main>
</body>

</html>
