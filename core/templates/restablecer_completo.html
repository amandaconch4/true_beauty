{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contraseña actualizada | True Beauty</title>
    <link rel="stylesheet" href="{% static 'css/profesional.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <header class="top-header">
        <h1 class="logo"><a href="{% url 'index' %}">True Beauty</a></h1>
        <a class="login-link" href="{% url 'profesional' %}">Volver</a>
    </header>

    <main class="content-container">
        <div class="form-box">
            <h2>Contraseña cambiada exitosamente</h2>
            <div class="mensaje-success">
                <i class="fas fa-check-circle"></i>
                <p>Tu contraseña ha sido actualizada correctamente.</p>
                <p>Ahora puedes iniciar sesión con tu nueva contraseña.</p>
            </div>
            <div class="button-container">
                <a href="{% url 'login' %}" class="submit-btn">Volver al login</a>
            </div>
        </div>
    </main>
</body>
</html>
