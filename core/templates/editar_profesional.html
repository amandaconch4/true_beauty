{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Profesional | True Beauty</title>
    <link rel="stylesheet" href="{% static 'css/panel_admin.css' %}">
</head>
<body>
    <div class="admin-container">
        <h2>Editar profesional</h2>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label for="username">Nombre de usuario</label>
                <input type="text" id="username" name="username" value="{{ profesional.username }}" required>
            </div>

            <div class="form-group">
                <label for="nombre_completo">Nombre completo</label>
                <input type="text" id="nombre_completo" name="nombre_completo" value="{{ profesional.nombre_completo }}" required>
            </div>

            <div class="form-group">
                <label for="email">Correo</label>
                <input type="email" id="email" name="email" value="{{ profesional.email }}" required>
            </div>

            <div class="form-group">
                <label for="celular">Celular</label>
                <input type="text" id="celular" name="celular" value="{{ profesional.celular }}">
            </div>

            <div class="form-group">
                <label for="direccion">Dirección</label>
                <input type="text" id="direccion" name="direccion" value="{{ profesional.direccion }}">
            </div>

            <div class="form-group">
                <label for="fecha_nacimiento">Fecha de nacimiento</label>
                <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" value="{{ profesional.fecha_nacimiento|date:'Y-m-d' }}">
            </div>

            <div class="form-group">
                <label for="password">Nueva contraseña</label>
                <input type="password" id="password" name="password">
            </div>

            <div class="button-container">
                <button type="submit" class="submit-btn">Guardar cambios</button>
                <a href="{% url 'panel_admin' %}" class="reset-btn">Volver</a>
            </div>
        </form>
    </div>
</body>
</html>
